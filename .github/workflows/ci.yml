name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check-types
      - run: pnpm test
      - run: pnpm build
      # Vector conformance: pinned bytes must recompute in fresh CI.
      - name: Verify pinned vectors survive a clean build
        run: node dist/cli.js verify spec/1.0/vectors/receipt-minimal.json
